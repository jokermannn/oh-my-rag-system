# Copy this file to secret.yaml and fill in your real values.
# secret.yaml is gitignored — never commit actual keys.
#
# Generate base64 values:
#   echo -n "your-api-key" | base64
apiVersion: v1
kind: Secret
metadata:
  name: rag-app-secret
  namespace: rag-system
type: Opaque
data:
  OPENAI_API_KEY: <base64-encoded-key>
